apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:2.17.2-pg16
          env:
            - name: POSTGRES_DB
              value: interceptor
            - name: POSTGRES_USER
              value: analyst
            - name: POSTGRES_PASSWORD
              value: interceptor
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
